<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scale=no">
    <title>UM MASIP 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #f0f4f1;
            --fg: #1a2e1a;
            --muted: #5a6e5a;
            --accent: #1b7a3d;
            --accent-light: #e8f5ec;
            --accent-dark: #0f5428;
            --gold: #c9a84c;
            --gold-light: #fdf6e3;
            --card: #ffffff;
            --border: #d4ddd4;
            --danger: #c0392b;
            --danger-light: #fdecea;
            --success: #27ae60;
            --warning: #e67e22;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100dvh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(27,122,61,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(201,168,76,0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .islamic-pattern {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 220px;
            background: var(--accent-dark);
            z-index: 0;
            overflow: hidden;
        }

        .islamic-pattern::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 30L30 60L0 30Z' fill='none' stroke='rgba(255,255,255,0.06)' stroke-width='0.5'/%3E%3Cpath d='M30 10L50 30L30 50L10 30Z' fill='none' stroke='rgba(255,255,255,0.04)' stroke-width='0.5'/%3E%3C/svg%3E");
            background-size: 60px 60px;
            animation: patternShift 30s linear infinite;
        }

        .islamic-pattern::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0; right: 0;
            height: 40px;
            background: var(--bg);
            clip-path: ellipse(55% 100% at 50% 100%);
        }

        @keyframes patternShift {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 420px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        #loginSection {
            padding-top: 24px;
            animation: fadeSlideDown 0.8s ease-out;
        }

        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
        }

        .logo-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            box-shadow:
                0 8px 32px rgba(0,0,0,0.15),
                inset 0 1px 0 rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .logo-circle::before {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            border: 2.5px solid var(--gold);
            z-index: 2;
            pointer-events: none;
        }

        .logo-circle img {
            width: 82px;
            height: 82px;
            object-fit: contain;
            display: block;
            position: relative;
            z-index: 1;
        }

        .logo-circle .logo-fallback {
            text-align: center;
            line-height: 1;
            position: relative;
            z-index: 1;
        }

        .logo-circle .logo-fallback .masjid-icon {
            font-size: 30px;
            color: var(--accent-dark);
            display: block;
            margin-bottom: 2px;
        }

        .logo-circle .logo-fallback .logo-text {
            font-size: 8px;
            font-weight: 800;
            color: var(--accent-dark);
            letter-spacing: 0.5px;
        }

        .title-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .title-main {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .title-sub {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .login-card {
            background: var(--card);
            border-radius: 20px;
            padding: 28px 24px;
            box-shadow:
                0 4px 24px rgba(0,0,0,0.06),
                0 1px 3px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .login-card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--fg);
            margin-bottom: 4px;
        }

        .login-card-desc {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--fg);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .form-input-wrapper { position: relative; }

        .form-input-wrapper .icon-left {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 14px;
            pointer-events: none;
            transition: color 0.2s;
        }

        .form-input {
            width: 100%;
            padding: 13px 14px 13px 40px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            color: var(--fg);
            background: var(--bg);
            transition: all 0.25s ease;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(27,122,61,0.1);
        }

        .form-input:focus ~ .icon-left { color: var(--accent); }

        .form-input.error {
            border-color: var(--danger);
            background: var(--danger-light);
            box-shadow: 0 0 0 3px rgba(192,57,43,0.08);
        }

        .select-wrapper { position: relative; }

        .select-wrapper::after {
            content: '\f107';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 12px;
            pointer-events: none;
        }

        .form-select {
            width: 100%;
            padding: 13px 38px 13px 40px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            color: var(--fg);
            background: var(--bg);
            transition: all 0.25s ease;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        .form-select:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(27,122,61,0.1);
        }

        .form-select.error {
            border-color: var(--danger);
            background: var(--danger-light);
        }

        .pw-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            transition: color 0.2s;
        }

        .pw-toggle:hover, .pw-toggle:focus-visible { color: var(--accent); }

        .error-msg {
            font-size: 11px;
            color: var(--danger);
            margin-top: 5px;
            display: none;
            align-items: center;
            gap: 4px;
        }

        .error-msg.show { display: flex; }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s ease;
        }

        .btn-login:hover::before { left: 100%; }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .btn-login .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: block; }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--danger);
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(192,57,43,0.3);
            z-index: 999;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 90vw;
            text-align: center;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        #resultSection {
            display: none;
            padding-top: 24px;
            animation: fadeSlideDown 0.6s ease-out;
        }

        .student-header {
            background: var(--card);
            border-radius: 20px;
            padding: 28px 24px 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .student-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 80px;
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
        }

        .student-photo-wrap {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }

        .student-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--card);
            box-shadow:
                0 4px 20px rgba(0,0,0,0.15),
                0 0 0 3px var(--gold);
            display: block;
            background: var(--bg);
        }

        .student-photo-fallback {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--card);
            box-shadow:
                0 4px 20px rgba(0,0,0,0.15),
                0 0 0 3px var(--gold);
            background: linear-gradient(135deg, var(--accent-light), #d4edda);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: var(--accent-dark);
        }

        .student-name {
            position: relative;
            z-index: 1;
            font-size: 17px;
            font-weight: 800;
            color: var(--fg);
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .student-nisn {
            position: relative;
            z-index: 1;
            font-size: 12px;
            color: var(--muted);
            font-weight: 500;
        }

        .student-nisn span {
            font-weight: 700;
            color: var(--accent);
        }

        .student-jumlah-mapel {
            position: relative;
            z-index: 1;
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
            opacity: 0.7;
        }

        .summary-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .summary-box {
            background: var(--bg);
            border-radius: 14px;
            padding: 14px 8px;
            text-align: center;
        }

        .summary-box .val {
            font-size: 22px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 4px;
        }

        .summary-box .label {
            font-size: 10px;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .val-rata { color: var(--accent-dark); }
        .val-tertinggi { color: var(--success); }
        .val-terendah { color: var(--warning); }

        .predikat-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 14px;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .predikat-sangat-baik {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724;
        }
        .predikat-baik {
            background: linear-gradient(135deg, #cce5ff, #b8daff);
            color: #004085;
        }
        .predikat-cukup {
            background: linear-gradient(135deg, #fff3cd, #ffeeba);
            color: #856404;
        }
        .predikat-kurang {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24;
        }

        .nilai-card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            margin-top: 16px;
        }

        .nilai-card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--fg);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nilai-card-title i { color: var(--accent); }

        .nilai-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nilai-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            background: var(--bg);
            border-radius: 12px;
            transition: transform 0.2s ease;
            opacity: 0;
            transform: translateY(10px);
        }

        .nilai-item.visible {
            opacity: 1;
            transform: translateY(0);
            transition: all 0.4s ease;
        }

        .nilai-item:active { transform: scale(0.985); }

        .nilai-subjek {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .nilai-icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .nilai-icon.agama {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724;
        }
        .nilai-icon.umum {
            background: linear-gradient(135deg, #e8f0fe, #d2e3fc);
            color: #1a56a0;
        }
        .nilai-icon.ipa {
            background: linear-gradient(135deg, #e8daef, #d2b4de);
            color: #6c3483;
        }
        .nilai-icon.ips {
            background: linear-gradient(135deg, #fef3e2, #fde8c8);
            color: #a0522d;
        }
        .nilai-icon.lain {
            background: linear-gradient(135deg, #e0e7ee, #cdd9e5);
            color: #34495e;
        }

        .nilai-subjek-text {
            font-size: 13px;
            font-weight: 600;
            color: var(--fg);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nilai-score-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .nilai-bar-bg {
            width: 50px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .nilai-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 0;
        }

        .nilai-score {
            font-size: 15px;
            font-weight: 800;
            min-width: 32px;
            text-align: right;
        }

        .score-a { color: var(--success); }
        .score-b { color: var(--accent); }
        .score-c { color: var(--warning); }
        .score-d { color: var(--danger); }

        .btn-logout {
            width: 100%;
            padding: 13px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            background: var(--card);
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s ease;
        }

        .btn-logout:active {
            transform: scale(0.98);
            background: var(--danger-light);
            color: var(--danger);
            border-color: var(--danger);
        }

        .footer {
            text-align: center;
            margin-top: 28px;
            padding-bottom: 20px;
        }

        .footer-text {
            font-size: 11px;
            color: var(--muted);
            opacity: 0.6;
            line-height: 1.6;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="islamic-pattern" aria-hidden="true"></div>
    <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

    <div class="container">

        <section id="loginSection" aria-label="Form Login">
            <div class="logo-wrapper">
                    <img
                        src="logo.png"
                        alt="Logo MASIP"
                        id="logoImg"
                        onerror="handleLogoError(this)"
                        width="80"
                    >
             </div>

            <div class="title-section">
                <h1 class="title-main">UMBK MASI 2026</h1>
                <p class="title-sub">Portal Hasil Ujian Madrasah</p>
            </div>

            <div class="login-card">
                <h2 class="login-card-title">Masuk untuk Melihat Hasil</h2>
                <p class="login-card-desc">Pilih nama dan masukkan password tanggal lahir (DDMMYY).</p>

                <div class="form-group">
                    <label class="form-label" for="namaSelect">Pilih Nama Peserta</label>
                    <div class="select-wrapper">
                        <select class="form-select" id="namaSelect" aria-required="true">
                            <option value="">-- Pilih Nama --</option>
                        </select>
                        <i class="fa-solid fa-user icon-left"></i>
                    </div>
                    <div class="error-msg" id="namaError">
                        <i class="fa-solid fa-circle-exclamation"></i>
                        <span>Silakan pilih nama terlebih dahulu</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="passwordInput">Password</label>
                    <div class="form-input-wrapper">
                        <input type="password" class="form-input" id="passwordInput" placeholder="Masukkan password" autocomplete="off" aria-required="true">
                        <i class="fa-solid fa-lock icon-left"></i>
                        <button type="button" class="pw-toggle" id="pwToggle" aria-label="Tampilkan password">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-msg" id="pwError">
                        <i class="fa-solid fa-circle-exclamation"></i>
                        <span>Password salah, silakan cek kembali</span>
                    </div>
                </div>

                <button type="button" class="btn-login" id="btnLogin">
                    <span class="btn-text">Lihat Hasil Ujian</span>
                    <div class="spinner"></div>
                </button>
            </div>

            <div class="footer">
                <p class="footer-text">MASIP &mdash; Madrasah Aliyah Syarikat Islam Parakansalak<br>&copy; 2026 Panitia UM</p>
            </div>
        </section>

        <section id="resultSection" aria-label="Hasil Ujian"></section>

    </div>

    <script>
        const subjectDefs = [
            { nama: "Akidah Akhlak",       icon: "fa-solid fa-heart",                kategori: "agama" },
            { nama: "Quran Hadits",         icon: "fa-solid fa-book-quran",           kategori: "agama" },
            { nama: "Fikih",                icon: "fa-solid fa-scale-balanced",       kategori: "agama" },
            { nama: "SKI",                  icon: "fa-solid fa-landmark",             kategori: "agama" },
            { nama: "Bahasa Arab",          icon: "fa-solid fa-language",             kategori: "agama" },
            { nama: "PPKn",                 icon: "fa-solid fa-gavel",                kategori: "umum" },
            { nama: "Bahasa Indonesia",     icon: "fa-solid fa-pen-nib",              kategori: "umum" },
            { nama: "Matematika",           icon: "fa-solid fa-calculator",           kategori: "umum" },
            { nama: "Bahasa Inggris",       icon: "fa-solid fa-spell-check",          kategori: "umum" },
            { nama: "Sejarah Indonesia",    icon: "fa-solid fa-monument",             kategori: "umum" },
            { nama: "SPSI",                 icon: "fa-solid fa-people-group",         kategori: "umum" },
            { nama: "Bahasa Sunda",         icon: "fa-solid fa-comment",              kategori: "umum" },
            { nama: "Matematika (IPA)",     icon: "fa-solid fa-square-root-variable", kategori: "ipa" },

        const namaSelect = document.getElementById('namaSelect');
        students.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.no;
            opt.textContent = s.nama;
            namaSelect.appendChild(opt);
        });

        const passwordInput = document.getElementById('passwordInput');
        const btnLogin = document.getElementById('btnLogin');
        const pwToggle = document.getElementById('pwToggle');
        const namaError = document.getElementById('namaError');
        const pwError = document.getElementById('pwError');
        const toast = document.getElementById('toast');
        const loginSection = document.getElementById('loginSection');
        const resultSection = document.getElementById('resultSection');

        pwToggle.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            pwToggle.innerHTML = isPassword
                ? '<i class="fa-solid fa-eye-slash"></i>'
                : '<i class="fa-solid fa-eye"></i>';
        });

        namaSelect.addEventListener('change', () => {
            namaSelect.classList.remove('error');
            namaError.classList.remove('show');
        });
        passwordInput.addEventListener('input', () => {
            passwordInput.classList.remove('error');
            pwError.classList.remove('show');
        });

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function scoreClass(n) {
            if (n >= 85) return 'score-a';
            if (n >= 70) return 'score-b';
            if (n >= 55) return 'score-c';
            return 'score-d';
        }

        function barColor(n) {
            if (n >= 85) return 'var(--success)';
            if (n >= 70) return 'var(--accent)';
            if (n >= 55) return 'var(--warning)';
            return 'var(--danger)';
        }

        function getPredikat(rata) {
            if (rata >= 85) return { text: 'SANGAT BAIK', cls: 'predikat-sangat-baik', icon: 'fa-solid fa-star' };
            if (rata >= 70) return { text: 'BAIK', cls: 'predikat-baik', icon: 'fa-solid fa-thumbs-up' };
            if (rata >= 55) return { text: 'CUKUP', cls: 'predikat-cukup', icon: 'fa-solid fa-hand' };
            return { text: 'KURANG', cls: 'predikat-kurang', icon: 'fa-solid fa-triangle-exclamation' };
        }

        function getNilaiSiswa(siswa) {
            const result = [];
            siswa.nilai.forEach((val, idx) => {
                if (val !== undefined && val !== null && val.trim() !== '') {
                    const score = parseInt(val, 10);
                    if (!isNaN(score)) {
                        result.push({ ...subjectDefs[idx], nilai: score });
                    }
                }
            });
            result.sort((a, b) => b.nilai - a.nilai);
            return result;
        }

        const fotoExtensions = ['jpg', 'jpeg', 'png', 'JPG', 'JPEG', 'PNG'];

        function handleLogoError(imgEl) {
            const fallback = document.createElement('div');
            fallback.className = 'logo-fallback';
            fallback.innerHTML = '<i class="fa-solid fa-mosque masjid-icon"></i><div class="logo-text">MASIP</div>';
            imgEl.replaceWith(fallback);
        }

        btnLogin.addEventListener('click', () => {
            const selectedNo = namaSelect.value;
            const pw = passwordInput.value.trim();
            let hasError = false;

            if (!selectedNo) {
                namaSelect.classList.add('error');
                namaError.classList.add('show');
                hasError = true;
            }

            if (!pw) {
                passwordInput.classList.add('error');
                pwError.querySelector('span').textContent = 'Password tidak boleh kosong';
                pwError.classList.add('show');
                hasError = true;
            }

            if (hasError) return;

            const siswa = students.find(s => s.no === parseInt(selectedNo));
            if (!siswa) {
                showToast('Data siswa tidak ditemukan');
                return;
            }

            if (siswa.password !== pw) {
                passwordInput.classList.add('error');
                pwError.querySelector('span').textContent = 'Password salah, silakan cek kembali';
                pwError.classList.add('show');
                showToast('Password yang Anda masukkan salah');
                return;
            }

            btnLogin.classList.add('loading');
            btnLogin.disabled = true;

            setTimeout(() => {
                btnLogin.classList.remove('loading');
                btnLogin.disabled = false;
                showResult(siswa);
            }, 1200);
        });

        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') btnLogin.click();
        });

        function showResult(siswa) {
            const nilaiList = getNilaiSiswa(siswa);
            const jumlahMapel = nilaiList.length;

            if (jumlahMapel === 0) {
                showToast('Belum ada data nilai untuk siswa ini');
                return;
            }

            const total = nilaiList.reduce((a, b) => a + b.nilai, 0);
            const rata = (total / jumlahMapel).toFixed(1);
            const tertinggi = Math.max(...nilaiList.map(n => n.nilai));
            const terendah = Math.min(...nilaiList.map(n => n.nilai));
            const predikat = getPredikat(parseFloat(rata));

            resultSection.innerHTML = `
                <div class="student-header">
                    <div class="student-photo-wrap">
                        <img class="student-photo" id="studentPhoto" src="foto/${siswa.nisn}.jpg" alt="Foto ${siswa.nama}" onerror="handleFotoError(this)">
                    </div>
                    <h2 class="student-name">${siswa.nama}</h2>
                    <p class="student-nisn">NISN: <span>${siswa.nisn}</span></p>
                    <p class="student-jumlah-mapel">${jumlahMapel} Mata Pelajaran Diujikan</p>

                    <div class="summary-row">
                        <div class="summary-box">
                            <div class="val val-rata">${rata}</div>
                            <div class="label">Rata-rata</div>
                        </div>
                        <div class="summary-box">
                            <div class="val val-tertinggi">${tertinggi}</div>
                            <div class="label">Tertinggi</div>
                        </div>
                        <div class="summary-box">
                            <div class="val val-terendah">${terendah}</div>
                            <div class="label">Terendah</div>
                        </div>
                    </div>

                    <div class="predikat-badge ${predikat.cls}">
                        <i class="${predikat.icon}"></i>
                        ${predikat.text}
                    </div>
                </div>

                <div class="nilai-card">
                    <h3 class="nilai-card-title">
                        <i class="fa-solid fa-list-check"></i>
                        Nilai Per Mata Pelajaran
                    </h3>
                    <div class="nilai-list" id="nilaiList">
                        ${nilaiList.map((n, i) => `
                            <div class="nilai-item" style="transition-delay: ${i * 50}ms">
                                <div class="nilai-subjek">
                                    <div class="nilai-icon ${n.kategori}">
                                        <i class="${n.icon}"></i>
                                    </div>
                                    <span class="nilai-subjek-text">${n.nama}</span>
                                </div>
                                <div class="nilai-score-wrap">
                                    <div class="nilai-bar-bg">
                                        <div class="nilai-bar-fill" data-width="${n.nilai}" style="background: ${barColor(n.nilai)}"></div>
                                    </div>
                                    <span class="nilai-score ${scoreClass(n.nilai)}">${n.nilai}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <button class="btn-logout" id="btnLogout" type="button">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    Keluar
                </button>

                <div class="footer">
                    <p class="footer-text">Hasil Ujian Madrasah MASIP 2026<br>Dicetak pada ${new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                </div>
            `;

            loginSection.style.display = 'none';
            resultSection.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });

            requestAnimationFrame(() => {
                const items = resultSection.querySelectorAll('.nilai-item');
                items.forEach((item, i) => {
                    setTimeout(() => {
                        item.classList.add('visible');
                        const bar = item.querySelector('.nilai-bar-fill');
                        if (bar) bar.style.width = bar.dataset.width + '%';
                    }, i * 50 + 200);
                });
            });

            document.getElementById('btnLogout').addEventListener('click', () => {
                resultSection.style.display = 'none';
                loginSection.style.display = 'block';
                namaSelect.value = '';
                passwordInput.value = '';
                passwordInput.type = 'password';
                pwToggle.innerHTML = '<i class="fa-solid fa-eye"></i>';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        function handleFotoError(imgEl) {
            const currentSrc = imgEl.src;
            const filename = currentSrc.split('/').pop();
            const nisn = filename.split('.')[0];
            const currentExt = filename.split('.').pop().toLowerCase();

            const extList = fotoExtensions.map(e => e.toLowerCase());
            const idx = extList.indexOf(currentExt);
            const nextExt = fotoExtensions[idx + 1];

            if (nextExt) {
                imgEl.src = `foto/${nisn}.${nextExt}`;
            } else {
                const fallback = document.createElement('div');
                fallback.className = 'student-photo-fallback';
                fallback.innerHTML = '<i class="fa-solid fa-user-graduate"></i>';
                imgEl.replaceWith(fallback);
            }
        }
    </script>
